version: '3.8'

services:
  toonflow:
    image: toonflow:latest
    container_name: toonflow-app
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${TOONFLOW_PORT:-10588}:10588"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10588/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app-network:
    external: true